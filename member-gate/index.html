<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会員ページ 認証</title>
  <style>
    body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f5f5f5}
    .box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08);width:90%;max-width:380px;text-align:center}
    h1{font-size:20px;margin-bottom:8px}
    p{color:#666;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;margin-bottom:12px;font-size:15px}
    button{width:100%;padding:12px;background:#000;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer}
    button:disabled{opacity:.5}
    .msg{color:#e00;font-size:13px;margin-top:12px;min-height:18px}
  </style>
</head>
<body>
  <div class="box">
    <h1>会員ページへようこそ</h1>
    <p>ご登録時のメールアドレスを入力してください</p>
    <input id="email" type="email" placeholder="you@example.com">
    <button id="btn" onclick="check()">入室する</button>
    <div class="msg" id="msg"></div>
  </div>
  <script>
    async function check(){
      const email=document.getElementById('email').value.trim();
      const msg=document.getElementById('msg');
      const btn=document.getElementById('btn');
      if(!email){msg.textContent='メールアドレスを入力してください';return;}
      btn.disabled=true;msg.textContent='確認中...';
      try{
        const r=await fetch('/api/check?email='+encodeURIComponent(email));
        const d=await r.json();
        if(d.ok){location.href=d.url;}
        else{msg.textContent='登録が見つかりませんでした。ご登録のメールをご確認ください。';btn.disabled=false;}
      }catch(e){msg.textContent='エラーが発生しました。時間をおいてお試しください。';btn.disabled=false;}
    }
  </script>
</body>
</html>
